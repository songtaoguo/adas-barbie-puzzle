<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fce4ec"/>
      <stop offset="100%" stop-color="#b3e5fc"/>
    </linearGradient>
    <linearGradient id="castle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8bbd0"/>
      <stop offset="100%" stop-color="#ec407a"/>
    </linearGradient>
  </defs>
  <rect width="600" height="600" fill="url(#sky)"/>
  <!-- Sun -->
  <circle cx="510" cy="90" r="55" fill="#fff59d"/>
  <circle cx="510" cy="90" r="40" fill="#ffeb3b"/>
  <!-- Clouds -->
  <ellipse cx="120" cy="120" rx="60" ry="22" fill="#ffffff" opacity="0.85"/>
  <ellipse cx="160" cy="105" rx="40" ry="20" fill="#ffffff" opacity="0.85"/>
  <ellipse cx="450" cy="200" rx="50" ry="18" fill="#ffffff" opacity="0.8"/>
  <!-- Stars -->
  <text x="80" y="280" font-size="36" fill="#ffd54f">★</text>
  <text x="540" y="280" font-size="32" fill="#ffd54f">★</text>
  <text x="60" y="380" font-size="22" fill="#ffeb3b">✦</text>
  <text x="540" y="380" font-size="26" fill="#ffeb3b">✦</text>
  <!-- Ground -->
  <rect x="0" y="500" width="600" height="100" fill="#a5d6a7"/>
  <ellipse cx="100" cy="510" rx="60" ry="10" fill="#81c784"/>
  <ellipse cx="500" cy="515" rx="80" ry="12" fill="#81c784"/>
  <!-- Castle base -->
  <rect x="190" y="320" width="220" height="200" fill="url(#castle)"/>
  <!-- Castle door -->
  <path d="M 270 520 L 270 440 Q 270 410 300 410 Q 330 410 330 440 L 330 520 Z" fill="#5d4037"/>
  <circle cx="320" cy="475" r="4" fill="#ffd54f"/>
  <!-- Castle windows -->
  <rect x="220" y="380" width="25" height="35" rx="12" fill="#fff59d"/>
  <rect x="355" y="380" width="25" height="35" rx="12" fill="#fff59d"/>
  <!-- Left tower -->
  <rect x="150" y="280" width="60" height="240" fill="url(#castle)"/>
  <polygon points="135,290 180,210 225,290" fill="#e91e63"/>
  <rect x="170" y="370" width="20" height="30" rx="10" fill="#fff59d"/>
  <!-- Right tower -->
  <rect x="390" y="280" width="60" height="240" fill="url(#castle)"/>
  <polygon points="375,290 420,210 465,290" fill="#e91e63"/>
  <rect x="410" y="370" width="20" height="30" rx="10" fill="#fff59d"/>
  <!-- Center tower -->
  <rect x="270" y="240" width="60" height="100" fill="url(#castle)"/>
  <polygon points="255,250 300,160 345,250" fill="#e91e63"/>
  <!-- Flags -->
  <line x1="180" y1="210" x2="180" y2="180" stroke="#5d4037" stroke-width="3"/>
  <polygon points="180,180 200,190 180,200" fill="#ffd54f"/>
  <line x1="420" y1="210" x2="420" y2="180" stroke="#5d4037" stroke-width="3"/>
  <polygon points="420,180 440,190 420,200" fill="#ffd54f"/>
  <line x1="300" y1="160" x2="300" y2="130" stroke="#5d4037" stroke-width="3"/>
  <polygon points="300,130 325,142 300,155" fill="#e91e63"/>
  <!-- Hearts -->
  <path d="M 70 70 C 70 60 80 50 95 60 C 110 50 120 60 120 70 C 120 85 95 100 95 100 C 95 100 70 85 70 70 Z" fill="#e91e63"/>
  <path d="M 380 70 C 380 64 386 58 395 64 C 404 58 410 64 410 70 C 410 79 395 88 395 88 C 395 88 380 79 380 70 Z" fill="#f06292"/>
</svg>
