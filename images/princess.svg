  <ellipse cx="340" cy="200" rx="50" ry="40" fill="#fff59d"/>
  <path d="M 230 180 Q 200 260 220 340 L 250 340 Q 240 260 260 200 Z" fill="#fff59d"/>
  <path d="M 390 180 Q 420 260 400 340 L 370 340 Q 380 260 360 200 Z" fill="#fff59d"/>
