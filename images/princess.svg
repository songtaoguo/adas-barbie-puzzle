  <path d="M 90 200 C 90 192 100 184 113 192 C 126 184 136 192 136 200 C 136 213 113 230 113 230 C 113 230 90 213 90 200 Z" fill="#e91e63" opacity="0.7"/>
  <path d="M 460 240 C 460 232 470 224 483 232 C 496 224 506 232 506 240 C 506 253 483 270 483 270 C 483 270 460 253 460 240 Z" fill="#ec407a" opacity="0.7"/>
