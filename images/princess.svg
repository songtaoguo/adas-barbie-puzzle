  <ellipse cx="288" cy="200" rx="6" ry="9" fill="#1a1a1a"/>
  <ellipse cx="332" cy="200" rx="6" ry="9" fill="#1a1a1a"/>
  <circle cx="290" cy="196" r="2" fill="#ffffff"/>
  <circle cx="334" cy="196" r="2" fill="#ffffff"/>
  <!-- Eyelashes -->
  <line x1="280" y1="190" x2="276" y2="184" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="296" y1="188" x2="296" y2="180" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="324" y1="188" x2="324" y2="180" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="340" y1="190" x2="344" y2="184" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Cheeks -->
  <ellipse cx="275" cy="225" rx="10" ry="6" fill="#f48fb1" opacity="0.7"/>
  <ellipse cx="345" cy="225" rx="10" ry="6" fill="#f48fb1" opacity="0.7"/>
  <!-- Smile -->
